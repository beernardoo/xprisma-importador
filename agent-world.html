<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AI Agent World — Among Us Style</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cy:#00f5ff;--gn:#00ff88;--or:#ff6b00;--bg:#04080f;--bd:#0d2847}
body{background:var(--bg);display:flex;height:100vh;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#8ab4d4}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,245,255,.01) 3px,rgba(0,245,255,.01) 4px);pointer-events:none;z-index:9999}
#sw{flex:1;position:relative;overflow:hidden;background:#030710}
#c{display:block;width:100%;height:100%}
.hud{width:275px;display:flex;flex-direction:column;border-left:1px solid var(--bd);background:rgba(4,8,15,.98)}
.topbar{padding:8px 12px;border-bottom:1px solid var(--bd);background:rgba(0,245,255,.02);display:flex;justify-content:space-between;align-items:center}
.tbt{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--cy);letter-spacing:3px;text-shadow:0 0 14px var(--cy)}
.tbr{font-size:10px;color:var(--cy)}
.panel{border-bottom:1px solid var(--bd);padding:10px 12px}
.ph{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:3px;color:var(--cy);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.badge{font-size:8px;padding:2px 6px;border-radius:8px;font-weight:bold}
.bg{background:var(--gn);color:#030810}.bo{background:var(--or);color:#030810}
.ar{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(13,40,71,.3)}
.ar:last-child{border:none}
.ae{font-size:14px;width:22px;text-align:center}
.ai{flex:1}.an{font-size:11px;color:#ddd}.arl{font-size:8px;color:#4a6888;letter-spacing:1px}
.as{font-size:8px;padding:2px 6px;border-radius:2px;font-weight:bold;letter-spacing:1px;white-space:nowrap}
.sw2{background:rgba(0,255,136,.08);color:var(--gn);border:1px solid rgba(0,255,136,.28)}
.sw3{background:rgba(0,245,255,.07);color:var(--cy);border:1px solid rgba(0,245,255,.18)}
.sw4{background:rgba(255,107,0,.08);color:var(--or);border:1px solid rgba(255,107,0,.22)}
.sw5{background:rgba(155,89,182,.08);color:#c39bd3;border:1px solid rgba(155,89,182,.22)}
.kc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.kh{font-size:8px;letter-spacing:2px;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.kdo .kh{color:var(--or)}.kbl .kh{color:#ff3366}.kdn .kh{color:var(--gn)}
.kcard{background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:2px;padding:4px 6px;margin-bottom:4px;font-size:8px;color:#88a8c0;line-height:1.5}
.kt{display:inline-block;font-size:7px;padding:1px 4px;border-radius:2px;margin-bottom:2px;letter-spacing:1px}
.tc{background:rgba(52,152,219,.1);color:#5dade2;border:1px solid rgba(52,152,219,.18)}
.td{background:rgba(0,245,255,.07);color:var(--cy);border:1px solid rgba(0,245,255,.14)}
.tt{background:rgba(255,107,0,.07);color:#ffaa55;border:1px solid rgba(255,107,0,.16)}
.ts{background:rgba(155,89,182,.07);color:#c39bd3;border:1px solid rgba(155,89,182,.16)}
.lw{flex:1;overflow:hidden;padding:10px 12px}
.lh{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:3px;color:var(--cy);margin-bottom:6px}
#lf{font-size:8px;line-height:1.95;overflow:hidden}
.ll{display:flex;gap:5px}.lt{color:#1a3558;min-width:40px}.lm{color:#486880}
.btm{position:fixed;bottom:0;left:0;right:0;height:24px;background:rgba(3,6,14,.99);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:20px;font-size:9px;z-index:100}
.bi{display:flex;gap:5px}.bl{color:#1a3558}.bv{color:var(--cy)}
</style>
</head>
<body>
<div id="sw"><canvas id="c"></canvas></div>
<div class="hud">
  <div class="topbar">
    <div class="tbt">◈ FUTURISTAS HQ</div>
    <div class="tbr" id="clk">00:00:00</div>
  </div>
  <div class="panel">
    <div class="ph">SQUAD <span class="badge bg">6 ONLINE</span></div>
    <div id="al"></div>
  </div>
  <div class="panel">
    <div class="ph">TAREFAS <span class="badge bo">7 ATIVAS</span></div>
    <div class="kc">
      <div class="kdo">
        <div class="kh">ANDAMENTO</div>
        <div class="kcard"><div class="kt tc">COPY</div><div>Headline Maio</div></div>
        <div class="kcard"><div class="kt td">DATA</div><div>Relatório sem.</div></div>
        <div class="kcard"><div class="kt tt">ADS</div><div>Lances Meta</div></div>
      </div>
      <div class="kbl">
        <div class="kh">BLOQUEADO</div>
        <div class="kcard"><div class="kt ts">DESIGN</div><div>Aguard. brief</div></div>
      </div>
      <div class="kdn">
        <div class="kh">CONCLUÍDO</div>
        <div class="kcard"><div class="kt tc">COPY</div><div>Email Abr</div></div>
        <div class="kcard"><div class="kt td">SEO</div><div>Audit</div></div>
        <div class="kcard"><div class="kt tt">ADS</div><div>UTMs</div></div>
      </div>
    </div>
  </div>
  <div class="lw">
    <div class="lh">◈ LOG AO VIVO</div>
    <div id="lf"></div>
  </div>
</div>
<div class="btm">
  <div class="bi"><span class="bl">AGENTES</span><span class="bv">6</span></div>
  <div class="bi"><span class="bl">TAREFAS</span><span class="bv">7</span></div>
  <div class="bi"><span class="bl">CONCLUÍDAS</span><span class="bv">35</span></div>
  <div class="bi"><span class="bl">TOKENS</span><span class="bv" id="tok">284,901</span></div>
  <div class="bi" style="margin-left:auto"><span class="bl">MODEL</span><span class="bv">claude-sonnet-4-6</span></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  SETUP  —  internal 640×390
// ══════════════════════════════════════════════════════
const IW=640, IH=390;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const SW=document.getElementById('sw');

let _pixiReady=false;
function resize(){
  canvas.width=SW.clientWidth; canvas.height=SW.clientHeight-24;
  if(_pixiReady) _pixiResize();
}
resize(); window.addEventListener('resize',resize);

function setTx(){
  const sc=Math.min(canvas.width/IW, canvas.height/IH);
  ctx.setTransform(sc,0,0,sc,(canvas.width-IW*sc)/2,(canvas.height-IH*sc)/2);
}

// Color utils
function dk(hex,a){
  let r=Math.max(0,parseInt(hex.slice(1,3),16)-a),
      g=Math.max(0,parseInt(hex.slice(3,5),16)-a),
      b=Math.max(0,parseInt(hex.slice(5,7),16)-a);
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function lk(hex,a){ return dk(hex,-a); }

// ══════════════════════════════════════════════════════
//  AMONG US CREWMATE DRAWING
// ══════════════════════════════════════════════════════
//
//  R = unit radius. Character total height ≈ 5.4*R
//  cx,cy = center bottom (feet level)
//
function crewBody(r){
  // The Among Us bean body path (translated to origin)
  ctx.beginPath();
  ctx.arc(0, -3.5*r, 1.25*r, Math.PI, 0);                      // top head arc
  ctx.bezierCurveTo( 1.85*r,-2.0*r,  1.75*r,-0.8*r,  1.5*r, 0); // right side
  ctx.arcTo(          1.5*r, 0.5*r,  0,      0.5*r,  0.5*r);    // bottom-right
  ctx.arcTo(         -1.5*r, 0.5*r, -1.5*r,  0,      0.5*r);    // bottom-left
  ctx.bezierCurveTo(-1.75*r,-0.8*r, -1.85*r,-2.0*r, -1.25*r,-3.5*r); // left side
  ctx.closePath();
}

function drawCrewmate(cx, cy, bc, vc, wf, state){
  const R = 14;
  const dark  = dk(bc, 58);
  const shade = dk(bc, 28);
  const walking = state.startsWith('walk');
  const sitting = state==='sitting'||state==='on_sofa';

  // walking animation
  const lOff  = walking ? Math.sin(wf*Math.PI/2)*R*0.42 : 0;
  const bOff  = walking ? Math.abs(Math.sin(wf*Math.PI/2))*R*0.18 : 0;

  ctx.save();
  ctx.translate(cx, cy - bOff);

  // ── SHADOW ──
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(0, bOff+2, R*1.35, R*0.3, 0, 0, Math.PI*2);
  ctx.fill();

  // ── LEGS ──
  function leg(lx, ly, rw, rh, rot){
    ctx.save(); ctx.translate(lx, ly); ctx.rotate(rot||0);
    // outline
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.ellipse(0,0, rw*1.18, rh*1.18, 0, 0, Math.PI*2); ctx.fill();
    // fill
    ctx.fillStyle=dark;
    ctx.beginPath(); ctx.ellipse(0,0, rw, rh, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if(sitting){
    leg(-R*0.9, -R*0.1, R*0.72, R*0.38, 0.25);
    leg( R*0.2, -R*0.1, R*0.72, R*0.38,-0.25);
  } else {
    leg(-R*0.45, -R*0.5+lOff,  R*0.42, R*0.68, 0);
    leg( R*0.45, -R*0.5-lOff,  R*0.42, R*0.68, 0);
  }

  // ── BODY OUTLINE ──
  ctx.save(); ctx.scale(1.08, 1.06);
  crewBody(R); ctx.fillStyle='#111'; ctx.fill();
  ctx.restore();

  // ── BODY FILL ──
  crewBody(R); ctx.fillStyle=bc; ctx.fill();

  // ── BODY SHADE (left side) ──
  ctx.save();
  ctx.clip();  // clip to body shape
  crewBody(R);
  ctx.fillStyle=shade;
  ctx.beginPath();
  ctx.ellipse(-R*0.6, -R*1.8, R*0.9, R*2.2, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── BACKPACK outline ──
  ctx.fillStyle='#111';
  ctx.beginPath();
  rr(-R*2.2, -R*3.0, R*1.05, R*1.75, R*0.22);
  ctx.fill();
  // fill
  ctx.fillStyle=dark;
  ctx.beginPath();
  rr(-R*2.05, -R*2.86, R*0.75, R*1.48, R*0.16);
  ctx.fill();
  // highlight stripe
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();
  rr(-R*1.98, -R*2.8, R*0.24, R*0.8, R*0.1);
  ctx.fill();

  // ── VISOR outline ──
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.ellipse(R*0.42, -R*3.65, R*1.0, R*0.68, 0.22, 0, Math.PI*2);
  ctx.fill();

  // ── VISOR fill ──
  ctx.fillStyle=vc;
  ctx.beginPath();
  ctx.ellipse(R*0.42, -R*3.65, R*0.84, R*0.54, 0.22, 0, Math.PI*2);
  ctx.fill();

  // ── VISOR inner glow ──
  ctx.fillStyle=lk(vc,35);
  ctx.beginPath();
  ctx.ellipse(R*0.3, -R*3.75, R*0.6, R*0.38, 0.22, 0, Math.PI*2);
  ctx.fill();

  // ── VISOR shine ──
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(R*0.05, -R*3.92, R*0.3, R*0.19, 0.22, 0, Math.PI*2);
  ctx.fill();

  // ── BODY HIGHLIGHT (top-right reflection) ──
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(R*0.45, -R*4.45, R*0.55, R*0.32, -0.4, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// rounded rect helper (fill only)
function rr(x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ══════════════════════════════════════════════════════
//  ROOM
// ══════════════════════════════════════════════════════
const WH=65;

function drawRoom(tick){
  const W=IW, H=IH;

  // ── DARK TECH FLOOR ──
  ctx.fillStyle='#080B16';ctx.fillRect(0,WH,W,H-WH);
  for(let fy=WH;fy<H;fy+=18){
    ctx.fillStyle=Math.floor((fy-WH)/18)%2===0?'#090D1C':'#0B1022';
    ctx.fillRect(0,fy,W,18);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,fy,W,1);
  }
  // Tile grout lines
  let stagger=false;
  for(let fy=WH;fy<H;fy+=18){
    const off=stagger?0:36;
    for(let fx=off;fx<W;fx+=72){ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(fx,fy,1,18);}
    stagger=!stagger;
  }
  // ── STRONG NEON GRID ──
  ctx.strokeStyle='rgba(0,245,255,0.4)';ctx.lineWidth=0.8;
  for(let x=0;x<W;x+=22){ctx.beginPath();ctx.moveTo(x,WH);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=WH;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Purple sub-grid
  ctx.strokeStyle='rgba(160,0,255,0.14)';ctx.lineWidth=0.5;
  for(let x=11;x<W;x+=22){ctx.beginPath();ctx.moveTo(x,WH);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=WH+11;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Bright intersection dots
  ctx.fillStyle='rgba(0,245,255,0.6)';
  for(let gx=0;gx<W;gx+=22) for(let gy=WH;gy<H;gy+=22){
    ctx.beginPath();ctx.arc(gx,gy,1.5,0,Math.PI*2);ctx.fill();
  }
  // Animated scan line
  const scanY=WH+((tick*1.4)%(H-WH));
  const sg2=ctx.createLinearGradient(0,scanY-4,0,scanY+4);
  sg2.addColorStop(0,'rgba(0,245,255,0)');sg2.addColorStop(0.5,'rgba(0,245,255,0.09)');sg2.addColorStop(1,'rgba(0,245,255,0)');
  ctx.fillStyle=sg2;ctx.fillRect(0,scanY-4,W,8);

  // ── DARK WALL ──
  const wg=ctx.createLinearGradient(0,0,0,WH+14);
  wg.addColorStop(0,'#030710');wg.addColorStop(0.7,'#060C1C');wg.addColorStop(1,'#0A1628');
  ctx.fillStyle=wg;ctx.fillRect(0,0,W,WH+14);
  // Wall scan lines
  ctx.fillStyle='rgba(255,255,255,0.016)';
  for(let wy=6;wy<WH;wy+=8) ctx.fillRect(0,wy,W,1);
  // Top neon strip
  ctx.fillStyle='rgba(0,245,255,0.5)';ctx.fillRect(0,0,W,1.5);
  ctx.fillStyle='rgba(0,245,255,0.1)';ctx.fillRect(0,1.5,W,6);
  // Wall-floor bright divider
  ctx.fillStyle='rgba(0,245,255,0.75)';ctx.fillRect(0,WH+9,W,2);
  ctx.fillStyle='rgba(0,245,255,0.18)';ctx.fillRect(0,WH+11,W,7);
  ctx.fillStyle='rgba(0,245,255,0.05)';ctx.fillRect(0,WH+18,W,10);

  // Windows
  [32,142,256,370,486].forEach((wx,wi)=>{
    // Outer glow
    ctx.fillStyle='rgba(0,160,255,0.05)';
    ctx.beginPath();ctx.ellipse(wx+17,26,24,28,0,0,Math.PI*2);ctx.fill();
    // Window casing (dark surround)
    ctx.fillStyle='#050C18';ctx.fillRect(wx-2,2,38,48);
    // Sky gradient
    const grd=ctx.createLinearGradient(0,3,0,46);
    grd.addColorStop(0,'#06101E');grd.addColorStop(0.25,'#0A1C38');
    grd.addColorStop(0.65,'#0D2850');grd.addColorStop(1,'#183870');
    ctx.fillStyle=grd;ctx.fillRect(wx,3,34,44);
    // Moon
    if(wi===2){
      ctx.fillStyle='rgba(220,230,255,0.85)';ctx.beginPath();ctx.arc(wx+24,10,3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#06101E';ctx.beginPath();ctx.arc(wx+25.5,9,3,0,Math.PI*2);ctx.fill();
    }
    // Stars
    ctx.fillStyle='rgba(220,235,255,0.75)';
    [[wx+5,7],[wx+12,5],[wx+22,8],[wx+8,14],[wx+27,6],[wx+15,11],[wx+29,13]].forEach(([sx,sy],si)=>{
      const twinkle=(tick*0.7+si*37+wi*17)%120;
      if(twinkle<85){ctx.globalAlpha=0.4+twinkle*0.006;ctx.beginPath();ctx.arc(sx,sy,0.7,0,Math.PI*2);ctx.fill();}
    });
    ctx.globalAlpha=1;
    // City skyline
    ctx.fillStyle='rgba(5,10,22,0.88)';
    [[0,10],[4,7],[8,13],[13,8],[17,11],[21,6],[25,10],[28,7],[31,14]].forEach(([bx,bh])=>{
      ctx.fillRect(wx+bx,47-bh,3,bh);
    });
    // Building window lights
    [[wx+1,40],[wx+5,37],[wx+9,38],[wx+14,42],[wx+18,39],[wx+22,41],[wx+26,40],[wx+29,37]].forEach(([lx,ly],li)=>{
      const on=(tick*0.4+li*23+wi*11)%100<70;
      ctx.fillStyle=on?'rgba(255,220,100,0.6)':'rgba(255,220,100,0.1)';
      ctx.fillRect(lx,ly,1.5,1.5);
    });
    // Window frame dividers
    ctx.fillStyle='#06101C';
    ctx.fillRect(wx,24,34,2);      // horizontal
    ctx.fillRect(wx+16,3,2,44);    // vertical
    ctx.fillRect(wx,3,34,1.5);     // top rail
    ctx.fillRect(wx,46,34,1.5);    // bottom sill
    ctx.fillRect(wx,3,1.5,44);     // left rail
    ctx.fillRect(wx+32.5,3,1.5,44);// right rail
    // Glass sheen (top-left pane)
    ctx.fillStyle='rgba(120,200,255,0.1)';ctx.fillRect(wx+2,4,13,8);
    ctx.fillStyle='rgba(120,200,255,0.05)';ctx.fillRect(wx+18,4,13,8);
    // Frame outer glow stroke
    ctx.strokeStyle='rgba(0,200,255,0.4)';ctx.lineWidth=0.8;ctx.strokeRect(wx,3,34,44);
    ctx.strokeStyle='rgba(0,245,255,0.14)';ctx.lineWidth=0.5;ctx.strokeRect(wx+1,4,32,42);
    // Window sill ledge
    const wsg=ctx.createLinearGradient(0,47,0,50);
    wsg.addColorStop(0,'#2A1C0E');wsg.addColorStop(1,'#1A1008');
    ctx.fillStyle=wsg;ctx.beginPath();rr(wx-3,47,40,4,0.5);ctx.fill();
    ctx.fillStyle='rgba(255,200,120,0.08)';ctx.fillRect(wx-2,47,38,1.5);
  });

  // Wall screen art
  ctx.fillStyle='#060C1A';ctx.fillRect(556,5,44,34);
  ctx.fillStyle='rgba(0,245,255,0.08)';ctx.fillRect(557,6,42,32);
  ctx.fillStyle='rgba(0,255,136,0.65)';
  [5,9,6,12,8,10,7,11].forEach((h,i)=>ctx.fillRect(559+i*5,37-h,4,h));
  ctx.strokeStyle='rgba(0,245,255,0.32)';ctx.lineWidth=0.7;ctx.strokeRect(556,5,44,34);

  // ── NEON WALL PILLARS ──
  [90,200,315,445,558].forEach((px,pi)=>{
    const fl=0.55+Math.sin(tick*0.06+pi*1.35)*0.25;
    ctx.globalAlpha=fl;
    ctx.fillStyle='#BB00FF';ctx.fillRect(px-1,0,2,WH+12);
    const pilg=ctx.createLinearGradient(px-14,0,px+14,0);
    pilg.addColorStop(0,'rgba(160,0,255,0)');pilg.addColorStop(0.5,'rgba(160,0,255,0.24)');pilg.addColorStop(1,'rgba(160,0,255,0)');
    ctx.fillStyle=pilg;ctx.fillRect(px-14,0,28,WH+12);
    ctx.globalAlpha=1;
    // floor reflection pool
    ctx.fillStyle=`rgba(140,0,255,${(fl*0.08).toFixed(2)})`;
    ctx.beginPath();ctx.ellipse(px,WH+18,14,5,0,0,Math.PI*2);ctx.fill();
  });

  // Sofa
  drawSofa(14,195);
  // Coffee table
  drawCoffeeTable(26,232);
  // Rug
  ctx.fillStyle='rgba(100,20,160,0.28)';ctx.fillRect(4,190,110,72);
  ctx.strokeStyle='rgba(180,60,220,0.3)';ctx.lineWidth=1;
  ctx.strokeRect(6,192,106,68);ctx.strokeRect(9,195,100,62);
  // Rug neon border glow
  ctx.strokeStyle='rgba(160,0,255,0.18)';ctx.lineWidth=0.6;
  ctx.strokeRect(5,191,108,70);

function drawScreenContent(sx,sy,sw,sh,idx,tick){
  // Each agent has a different screen
  ctx.save();
  ctx.beginPath();ctx.rect(sx,sy,sw,sh);ctx.clip();
  switch(idx){
    case 0:{ // Ogilvy — text editor
      ctx.fillStyle='rgba(200,220,255,0.08)';ctx.fillRect(sx,sy,sw,sh);
      // Line numbers
      ctx.fillStyle='rgba(80,120,180,0.5)';
      for(let l=0;l<5;l++) ctx.fillText(l+1+'',sx+2,sy+4+l*4);
      // Code lines
      const lens=[14,10,16,8,12];
      const cols=['rgba(0,245,255,0.7)','rgba(255,160,50,0.7)','rgba(150,255,150,0.7)',
                  'rgba(255,100,150,0.7)','rgba(200,200,255,0.6)'];
      lens.forEach((lw,l)=>{
        ctx.fillStyle=cols[l];
        ctx.fillRect(sx+7,sy+2+l*4,lw,1.5);
      });
      // Cursor blink
      if(tick%60<30){ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(sx+7,sy+2,1,6);}
      break;
    }
    case 1:{ // Atlas — traffic bars
      ctx.fillStyle='rgba(255,107,0,0.12)';ctx.fillRect(sx,sy,sw,sh);
      const bh=[3,6,4,9,5,7,10,6,8,7,11,5];
      bh.forEach((h,i)=>{
        const hh=h+Math.sin(tick*0.08+i)*0.8;
        const g=ctx.createLinearGradient(0,sy+sh-hh,0,sy+sh);
        g.addColorStop(0,'rgba(255,107,0,0.9)');g.addColorStop(1,'rgba(180,50,0,0.7)');
        ctx.fillStyle=g;ctx.fillRect(sx+1+i*2,sy+sh-hh,1.5,hh);
      });
      ctx.fillStyle='rgba(0,245,255,0.55)';ctx.font='3px monospace';ctx.textAlign='left';
      ctx.fillText('ROAS 4.2x ↑',sx+1,sy+3.5);
      break;
    }
    case 2:{ // Kaushik — line chart
      ctx.fillStyle='rgba(0,255,136,0.07)';ctx.fillRect(sx,sy,sw,sh);
      ctx.strokeStyle='rgba(0,255,136,0.8)';ctx.lineWidth=1;
      ctx.beginPath();
      const pts=[sy+sh-3,sy+sh-5,sy+sh-4,sy+sh-7,sy+sh-6,sy+sh-8,sy+sh-7,sy+sh-10,sy+sh-9,sy+sh-11];
      pts.forEach((py2,i)=>{
        const px2=sx+1+i*(sw-2)/9;
        i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
      });
      ctx.stroke();
      // Fill under line
      ctx.lineTo(sx+sw-1,sy+sh);ctx.lineTo(sx+1,sy+sh);ctx.closePath();
      ctx.fillStyle='rgba(0,255,136,0.12)';ctx.fill();
      ctx.fillStyle='rgba(0,255,136,0.6)';ctx.fillText('847 leads',sx+1,sy+3.5);
      break;
    }
    case 3:{ // Neri — design tool
      ctx.fillStyle='rgba(200,100,255,0.06)';ctx.fillRect(sx,sy,sw,sh);
      // Color palette swatches
      ['#FF3366','#FF6B00','#FFD700','#00FF88','#00F5FF','#9B59B6'].forEach((c,i)=>{
        ctx.fillStyle=c;ctx.fillRect(sx+1+i*4,sy+1,3.5,4);
        ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.3;
        ctx.strokeRect(sx+1+i*4,sy+1,3.5,4);
      });
      // Canvas grid
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.3;
      for(let g=0;g<5;g++) ctx.strokeRect(sx+1+g*5,sy+7,4,4);
      ctx.fillStyle='rgba(255,107,200,0.5)';ctx.fillRect(sx+6,sy+8,8,3);
      break;
    }
    case 4:{ // Rand — SEO keywords
      ctx.fillStyle='rgba(0,100,120,0.1)';ctx.fillRect(sx,sy,sw,sh);
      const kws=[['#nutri',9],['saude',7],['supl.',11],['vita',6]];
      kws.forEach(([kw,bw],i)=>{
        ctx.fillStyle='rgba(0,150,180,0.35)';ctx.fillRect(sx+1,sy+1+i*4,bw,3);
        ctx.fillStyle='rgba(0,245,255,0.75)';ctx.fillText(kw,sx+2,sy+3.5+i*4);
      });
      break;
    }
    case 5:{ // Hormozi — funnel
      ctx.fillStyle='rgba(255,140,0,0.07)';ctx.fillRect(sx,sy,sw,sh);
      const steps=[[sw-2,4,'rgba(255,60,60,0.7)'],[sw-6,3,'rgba(255,150,50,0.7)'],
                   [sw-10,3,'rgba(255,220,50,0.7)'],[sw-14,3,'rgba(50,255,100,0.7)']];
      steps.forEach(([fw,fh,fc],i)=>{
        ctx.fillStyle=fc;ctx.fillRect(sx+sw/2-fw/2,sy+1+i*4,fw,fh);
      });
      ctx.fillStyle='rgba(255,200,50,0.6)';ctx.fillText('ROAS 6x',sx+1,sy+sh-1);
      break;
    }
  }
  ctx.restore();
  ctx.font='3px "Share Tech Mono"';
}

function drawDesk(x,y,tick,idx,scr){
  // ── Chair ──

  ctx.fillStyle='#232F40';ctx.fillRect(x-8,y-10,16,7);

  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x-16,y+5,32,2);
  // Desk front face
  ctx.fillStyle='#3A2818';ctx.fillRect(x-16,y+17,32,5);

  ctx.fillStyle='#1A1008';ctx.beginPath();ctx.ellipse(x+8,y+10,2,1.5,0,0,Math.PI*2);ctx.fill();

  // ── Monitor stand base ──

  ctx.beginPath();rr(x-5,y+3,10,3,1);ctx.fill();
  // Stand neck
  ctx.fillStyle='#090F1C';ctx.fillRect(x-1.5,y-3,3,7);

  // ── Monitor bezel ──
  const mw=30,mh=20;
  ctx.fillStyle='#06090F';
  ctx.beginPath();rr(x-mw/2-2,y-mh-5,mw+4,mh+5,2);ctx.fill();
  // Bezel bottom bar (brand area)
  ctx.fillStyle='#0A0F1A';ctx.fillRect(x-mw/2-2,y-5,mw+4,4);
  // Power LED
  const ledOn=tick%80<50;
  ctx.fillStyle=ledOn?'#00FF88':'#003311';

  if(ledOn){ctx.fillStyle='rgba(0,255,136,0.2)';ctx.beginPath();ctx.arc(x+mw/2-1,y-3,2.5,0,Math.PI*2);ctx.fill();}

  // ── Screen ──
  const fl=0.65+Math.sin(tick*0.09+idx*1.6)*0.1;
  ctx.globalAlpha=fl;
  ctx.fillStyle=scr;ctx.fillRect(x-mw/2,y-mh-3,mw,mh);
  ctx.font='3px "Share Tech Mono"';ctx.textAlign='left';
  drawScreenContent(x-mw/2,y-mh-3,mw,mh,idx,tick);
  ctx.globalAlpha=1;

  // Screen glow on desk surface
  ctx.fillStyle='rgba(0,80,160,0.08)';ctx.fillRect(x-mw/2,y+5,mw,4);

  // Monitor frame glow
  ctx.strokeStyle='rgba(0,245,255,0.25)';ctx.lineWidth=0.6;
  ctx.strokeRect(x-mw/2-2,y-mh-5,mw+4,mh+5);

  // ── Keyboard ──
  const kg=ctx.createLinearGradient(0,y+7,0,y+14);
  kg.addColorStop(0,'#1A2438');kg.addColorStop(1,'#141C2C');
  ctx.fillStyle=kg;ctx.beginPath();rr(x-11,y+7,20,7,1);ctx.fill();
  ctx.strokeStyle='rgba(0,100,200,0.2)';ctx.lineWidth=0.4;ctx.strokeRect(x-11,y+7,20,7);
  // Keys
  ctx.fillStyle='#222E44';
  for(let r=0;r<3;r++) for(let k=0;k<8;k++) ctx.fillRect(x-10+k*2.4,y+8+r*2,2,1.6);
  // Space bar
  ctx.fillStyle='#243050';ctx.beginPath();rr(x-5,y+13,8,1.5,0.5);ctx.fill();
  // Keyboard glow (active typing)
  if(tick%120<60&&(idx===0||idx===2||idx===4)){
    ctx.fillStyle='rgba(0,245,255,0.08)';ctx.fillRect(x-11,y+7,20,7);
  }

  // ── Mouse ──
  ctx.fillStyle='#141E2E';ctx.beginPath();ctx.ellipse(x+13,y+10,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1E2C40';ctx.fillRect(x+12,y+8,2,3);
  // Scroll wheel
  ctx.fillStyle='rgba(0,245,255,0.3)';ctx.fillRect(x+12.5,y+9,1,1.5);

  // ── Mug ──
  ctx.fillStyle='#7A1A1A';ctx.beginPath();rr(x-15,y+6,5,7,1);ctx.fill();
  ctx.fillStyle='rgba(255,80,80,0.25)';ctx.fillRect(x-15,y+6,5,2);
  ctx.strokeStyle='#7A1A1A';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(x-10.5,y+10,2,-Math.PI*0.5,Math.PI*0.5);ctx.stroke();
  // Steam
  if(tick%60<30){ctx.fillStyle='rgba(200,200,255,0.22)';ctx.fillRect(x-14,y+3,1,3);}

  // ── Sticky note ──
  ctx.fillStyle='#B8A010';ctx.fillRect(x+14,y+5,9,8);

}

function drawBigPlant(x,y,tick){
  const sw=Math.sin(tick*0.025)*2.8;

  // ── Pot shadow ──
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(x,y+41,18,4,0,0,Math.PI*2);ctx.fill();

  // ── Pot body ──
  const pg=ctx.createLinearGradient(x-16,0,x+16,0);
  pg.addColorStop(0,'#6A3005');pg.addColorStop(0.4,'#B85E18');pg.addColorStop(0.7,'#C86A20');pg.addColorStop(1,'#6A3005');
  ctx.fillStyle=pg;
  ctx.beginPath();ctx.moveTo(x-14,y+16);ctx.lineTo(x-10,y+40);ctx.lineTo(x+10,y+40);ctx.lineTo(x+14,y+16);ctx.closePath();ctx.fill();
  // pot rim
  const rg=ctx.createLinearGradient(0,y+14,0,y+20);
  rg.addColorStop(0,'#D07028');rg.addColorStop(1,'#8A4010');
  ctx.fillStyle=rg;ctx.beginPath();rr(x-16,y+14,32,6,1);ctx.fill();
  ctx.fillStyle='rgba(255,180,90,0.2)';ctx.fillRect(x-14,y+15,28,2);
  // pot texture bands
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.fillRect(x-12,y+22,24,1);ctx.fillRect(x-11,y+28,22,1);ctx.fillRect(x-10,y+34,20,1);
  // pot highlight
  ctx.fillStyle='rgba(255,200,120,0.1)';ctx.fillRect(x-13,y+16,5,22);
  // soil
  ctx.fillStyle='#1A0E06';ctx.beginPath();rr(x-13,y+17,26,4,0.5);ctx.fill();
  ctx.fillStyle='rgba(80,50,20,0.5)';
  for(let s=0;s<5;s++) ctx.fillRect(x-10+s*4,y+17,3,2);
  // soil pebbles
  ctx.fillStyle='rgba(100,70,40,0.6)';
  [[x-8,y+19],[x-2,y+18],[x+4,y+19],[x+8,y+18]].forEach(([px,py])=>{
    ctx.beginPath();ctx.arc(px,py,0.8,0,Math.PI*2);ctx.fill();
  });

  // ── Trunk ──
  const tg=ctx.createLinearGradient(x-3,0,x+3,0);
  tg.addColorStop(0,'#1A5010');tg.addColorStop(0.5,'#267A18');tg.addColorStop(1,'#1A5010');
  ctx.fillStyle=tg;ctx.fillRect(x-2.5,y-28,5.5,48);
  ctx.fillStyle='rgba(80,200,80,0.18)';ctx.fillRect(x-1,y-28,1.5,48);
  // trunk rings
  ctx.strokeStyle='rgba(0,80,0,0.2)';ctx.lineWidth=0.5;
  for(let tr=0;tr<5;tr++){ctx.beginPath();ctx.moveTo(x-2.5,y-20+tr*9);ctx.lineTo(x+3,y-20+tr*9);ctx.stroke();}

  // ── Leaves ──
  const leafDefs=[
    [-2.3,38,'#145A06',-1],[-1.7,34,'#1C7A10',1],[-1.1,42,'#12780A',-1],
    [-0.4,37,'#1A7210',1],[0.2,39,'#145A06',-1],[0.9,36,'#1C7A10',1],
    [1.5,41,'#12780A',-1],[2.1,35,'#1A7210',1],[2.6,39,'#145A06',-1],
  ];
  leafDefs.forEach(([a,l,c,side],i)=>{
    ctx.save();
    ctx.translate(x+sw*0.2*side,y-10+sw*0.12*(i%2?1:-1));
    ctx.rotate(a+sw*0.035*(i%2?1:-1));
    // leaf fill
    const lg=ctx.createLinearGradient(0,0,l,0);
    lg.addColorStop(0,c);lg.addColorStop(0.5,lk(c,15));lg.addColorStop(1,dk(c,10));
    ctx.fillStyle=lg;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(l*0.25,-8,l*0.7,-10,l,-4);
    ctx.bezierCurveTo(l*0.7, 5,l*0.25, 4,0,1);
    ctx.closePath();ctx.fill();
    // midrib
    ctx.strokeStyle='rgba(0,100,0,0.3)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(1,0);ctx.quadraticCurveTo(l*0.55,-2,l-2,-1);ctx.stroke();
    // side veins
    ctx.strokeStyle='rgba(0,100,0,0.15)';ctx.lineWidth=0.4;
    [0.25,0.45,0.65].forEach(t=>{
      ctx.beginPath();ctx.moveTo(l*t,-1);ctx.lineTo(l*t-2,-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(l*t,-1);ctx.lineTo(l*t+1, 3);ctx.stroke();
    });
    ctx.restore();
  });
}

function drawLamp(x,y,tick){
  const gw=0.72+Math.sin(tick*0.04)*0.12;

  // ── Floor light cone ──
  ctx.save();
  const cg=ctx.createRadialGradient(x,y+5,2,x,y+38,38);
  cg.addColorStop(0,`rgba(255,190,60,${(gw*0.18).toFixed(2)})`);
  cg.addColorStop(1,'rgba(255,160,40,0)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.moveTo(x-10,y+5);ctx.lineTo(x-38,y+40);ctx.lineTo(x+38,y+40);ctx.lineTo(x+10,y+5);
  ctx.closePath();ctx.fill();
  ctx.restore();

  // ── Weighted base ──
  const bg=ctx.createLinearGradient(x-9,0,x+9,0);
  bg.addColorStop(0,'#181E2A');bg.addColorStop(0.5,'#252E40');bg.addColorStop(1,'#181E2A');

  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(x-7,y+32,14,1.5);
  ctx.fillStyle='#10161E';ctx.beginPath();rr(x-6,y+37,12,3,1);ctx.fill();

  // ── Pole ──
  const pg=ctx.createLinearGradient(x-2,0,x+2,0);

  ctx.fillStyle=pg;ctx.fillRect(x-1.8,y+2,3.6,32);
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(x-0.8,y+3,0.9,30);

  // ── Shade body ──
  ctx.fillStyle='#16202E';
  ctx.beginPath();
  ctx.moveTo(x-15,y+5);ctx.lineTo(x-9,y-6);ctx.lineTo(x+9,y-6);ctx.lineTo(x+15,y+5);
  ctx.closePath();ctx.fill();
  // inner warm tint
  const shadeg=ctx.createLinearGradient(0,y-6,0,y+5);
  shadeg.addColorStop(0,'rgba(255,190,60,0.06)');
  shadeg.addColorStop(1,'rgba(255,180,50,0.2)');
  ctx.fillStyle=shadeg;
  ctx.beginPath();
  ctx.moveTo(x-15,y+5);ctx.lineTo(x-9,y-6);ctx.lineTo(x+9,y-6);ctx.lineTo(x+15,y+5);
  ctx.closePath();ctx.fill();
  // shade outline
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.7;
  ctx.beginPath();
  ctx.moveTo(x-15,y+5);ctx.lineTo(x-9,y-6);ctx.lineTo(x+9,y-6);ctx.lineTo(x+15,y+5);
  ctx.closePath();ctx.stroke();
  // top rim
  ctx.strokeStyle='rgba(0,245,255,0.15)';ctx.lineWidth=0.6;
  ctx.beginPath();ctx.moveTo(x-9,y-6);ctx.lineTo(x+9,y-6);ctx.stroke();

  // ── Bulb + glow ──
  ctx.globalAlpha=gw;
  ctx.fillStyle='#FFD870';ctx.beginPath();ctx.arc(x,y+1,2.5,0,Math.PI*2);ctx.fill();

function drawSmallPlant(x,y,tick,id){
  const sw=Math.sin(tick*0.03+id*1.8)*1.8;

  // ── Pot shadow ──
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(x,y+20,8,2,0,0,Math.PI*2);ctx.fill();

  // ── Pot body (tapered) ──

  pg.addColorStop(0,'#5A2A08');pg.addColorStop(0.5,'#8B4418');pg.addColorStop(1,'#5A2A08');
  ctx.fillStyle=pg;
  ctx.beginPath();ctx.moveTo(x-7,y+8);ctx.lineTo(x-5,y+20);ctx.lineTo(x+5,y+20);ctx.lineTo(x+7,y+8);ctx.closePath();ctx.fill();
  // pot rim
  const rg=ctx.createLinearGradient(0,y+7,0,y+11);
  rg.addColorStop(0,'#A85A20');rg.addColorStop(1,'#7A3E10');
  ctx.fillStyle=rg;ctx.beginPath();rr(x-8,y+7,16,4,1);ctx.fill();
  ctx.fillStyle='rgba(255,190,100,0.15)';ctx.fillRect(x-7,y+7,14,1.5);
  // soil
  ctx.fillStyle='#140E06';ctx.beginPath();rr(x-7,y+9,14,3,0.5);ctx.fill();
  ctx.fillStyle='rgba(80,50,20,0.45)';
  for(let s=0;s<4;s++) ctx.fillRect(x-5+s*3,y+9,2,1.5);
  // pot highlight
  ctx.fillStyle='rgba(255,200,120,0.09)';ctx.fillRect(x-6.5,y+9,3,8);

  // ── Stem ──
  ctx.strokeStyle='#1A6012';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y+9);ctx.bezierCurveTo(x-1,y+4,x+1,y,x,y-3);ctx.stroke();

  // ── Leaves ──
  function leaf(lx,ly,dx,dy,baseRot,col,vein){
    ctx.save();ctx.translate(lx,ly);ctx.rotate(baseRot+sw*0.055);
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(dx*0.3,-dy*0.6,dx*0.8,-dy*0.4,dx,0);
    ctx.bezierCurveTo(dx*0.8,dy*0.4,dx*0.3,dy*0.6,0,0);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=vein;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(1,0);ctx.quadraticCurveTo(dx*0.5,0,dx-1,0);ctx.stroke();
    ctx.restore();
  }
  leaf(x-1,y+2,-11,4,-0.55,'#1A7A14','rgba(0,100,0,0.35)');
  leaf(x+1,y+1, 10,4, 0.48,'#207A18','rgba(0,110,0,0.3)');
  leaf(x-1,y-1,-9, 3.5,-0.95,'#1E8818','rgba(0,120,0,0.3)');
  leaf(x+1,y-1, 9, 3.5, 0.88,'#1A7020','rgba(0,100,0,0.3)');
  leaf(x,  y-3,-8, 3,  -0.3, '#24901C','rgba(0,130,0,0.3)');
  leaf(x,  y-4, 7, 3,   0.28,'#209018','rgba(0,120,0,0.3)');
  // top new leaf (curled)
  ctx.save();ctx.translate(x+sw*0.04,y-4+sw*0.05);
  ctx.fillStyle='#2AAA22';
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-1.5,-3,0.5,-6,0,-7);
  ctx.bezierCurveTo(0.5,-6,2,-3,0,0);ctx.closePath();ctx.fill();
  ctx.restore();
}

  // Top cable organizer bar
  ctx.fillStyle='#060C18';ctx.beginPath();rr(x,y-rh-4,rw,5,1);ctx.fill();
  ctx.strokeStyle='rgba(0,245,255,0.2)';ctx.lineWidth=0.5;ctx.beginPath();rr(x,y-rh-4,rw,5,1);ctx.stroke();
  // Cable organizer holes
  for(let ch=0;ch<5;ch++){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.arc(x+4+ch*5,y-rh-1.5,1.2,0,Math.PI*2);ctx.fill();}

  // ── Front panel (inner recess) ──
  ctx.fillStyle='#0A1428';ctx.fillRect(x+2,y-rh+2,rw-4,rh-4);

  // ── Server units (1U each = 9px) ──
  const SLED=['#00FF88','#00FFFF','#FF4400','#00FF88','#FFB800','#00FF88','#00FFFF','#FF4400','#00FF88','#FFBB00','#00FFFF','#FF4400'];
  const ALED=['#0066FF','#0044FF','#0055FF','#0077FF','#0044FF','#0066FF','#0055FF','#0033FF','#0077FF','#0055FF','#0033FF','#0066FF'];
  const numUnits=Math.floor((rh-8)/10);
  for(let i=0;i<numUnits;i++){
    const uy=y-rh+4+i*10;
    // unit body
    const ug=ctx.createLinearGradient(0,uy,0,uy+9);
    ug.addColorStop(0,'#0F1828');ug.addColorStop(1,'#0A1018');
    ctx.fillStyle=ug;ctx.beginPath();rr(x+3,uy,rw-6,9,1);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.3;ctx.beginPath();rr(x+3,uy,rw-6,9,1);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(x+4,uy+0.5,rw-8,1.2);

    // drive bays (2 per unit)
    for(let d=0;d<2;d++){
      ctx.fillStyle='#030710';ctx.fillRect(x+4+d*6,uy+2.5,5,4);
      ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=0.3;ctx.strokeRect(x+4+d*6,uy+2.5,5,4);
      if(Math.sin(tick*0.28+i*1.9+d*3.3)>0.55){
        ctx.fillStyle='rgba(0,100,255,0.22)';ctx.fillRect(x+4+d*6,uy+2.5,5,4);

    }

    // Vent slots
    for(let v=0;v<4;v++) ctx.fillStyle='rgba(0,0,0,0.65)',ctx.fillRect(x+rw-11+v*2,uy+3.5,1.4,3);

    // Power LED (big)
    const li=i%SLED.length;
    const pon=tick%(52+i*7)<(i%3===0?32:40);
    ctx.fillStyle=pon?SLED[li]:'#060C14';
    ctx.beginPath();ctx.arc(x+rw-5,uy+3,1.2,0,Math.PI*2);ctx.fill();
    if(pon){ctx.fillStyle=SLED[li]+'40';ctx.beginPath();ctx.arc(x+rw-5,uy+3,3,0,Math.PI*2);ctx.fill();}

    // Activity LED
    const aon=Math.sin(tick*0.3+i*2.5)>0.1;
    ctx.fillStyle=aon?ALED[li]:'#020810';
    ctx.beginPath();ctx.arc(x+rw-5,uy+7,0.9,0,Math.PI*2);ctx.fill();

    // Unit label
    ctx.fillStyle='rgba(60,100,150,0.6)';ctx.font='2.5px monospace';ctx.textAlign='left';
    ctx.fillText('SRV'+(i+1<10?'0':'')+(i+1),x+4,uy+8);
  }

  // ── Bottom cable tray ──
  ctx.fillStyle='#040810';ctx.beginPath();rr(x+2,y-7,rw-4,7,1);ctx.fill();
  ctx.strokeStyle='rgba(0,245,255,0.1)';ctx.lineWidth=0.3;ctx.beginPath();rr(x+2,y-7,rw-4,7,1);ctx.stroke();
  const cableC=['#2A0A60','#0A2A60','#0A400A','#501A0A','#0A3040','#400A40'];
  cableC.forEach((cc,ci)=>{
    ctx.strokeStyle=cc;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+3+ci*4,y-6);
    ctx.bezierCurveTo(x+2+ci*4,y-3,x+5+ci*4,y,x+4+ci*4,y+4);
    ctx.stroke();
  });

  // ── Label ──
  ctx.fillStyle='rgba(0,245,255,0.6)';ctx.font='bold 4px monospace';ctx.textAlign='center';
  ctx.fillText('SERVER',x+rw/2,y+8);
  ctx.fillStyle='rgba(0,245,255,0.35)';ctx.font='3px monospace';
  ctx.fillText('RACK',x+rw/2,y+12.5);
}

  // Connector caps

  ctx.beginPath(); ctx.moveTo(hx-8,-13); ctx.lineTo(hx-13,-22); ctx.lineTo(hx-4,-15); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hx+8,-13); ctx.lineTo(hx+13,-22); ctx.lineTo(hx+4,-15); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,150,150,0.4)';
  ctx.beginPath(); ctx.moveTo(hx-7.5,-13); ctx.lineTo(hx-10,-19); ctx.lineTo(hx-5,-15.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hx+7.5,-13); ctx.lineTo(hx+10,-19); ctx.lineTo(hx+5,-15.5); ctx.closePath(); ctx.fill();
  // Eyes (open golden)
  ctx.fillStyle='#FFCC20';
  ctx.beginPath(); ctx.ellipse(hx-3.5,-8,2.5,2.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+3.5,-8,2.5,2.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#140800';
  ctx.beginPath(); ctx.ellipse(hx-3.5,-8,1.2,1.9,0,0,Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.arc(hx-4,-8.6,0.7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+3,-8.6,0.7,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#FF7788'; ctx.beginPath(); ctx.arc(hx,-4.5,1.2,0,Math.PI*2); ctx.fill();

  // Whiskers
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=0.4;
  [[-13,-5,-2,-4.5],[-12,-3.5,-2,-3.8]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1+hx,y1); ctx.lineTo(x2+hx,y2); ctx.stroke();
  });
  [[13,-5,2,-4.5],[12,-3.5,2,-3.8]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1+hx,y1); ctx.lineTo(x2+hx,y2); ctx.stroke();
  });
  ctx.restore();
}

// ══════════════════════════════════════════════════════
const ADEFS=[
  {name:'Ogilvy', role:'Copywriter',  emoji:'✍️', bc:'#1565C0',vc:'#29B6F6'},
  {name:'Atlas',  role:'Traffic',     emoji:'📡', bc:'#B71C1C',vc:'#FF5252'},
  {name:'Kaushik',role:'Data',        emoji:'📊', bc:'#1B5E20',vc:'#69F0AE'},
  {name:'Neri',   role:'Design',      emoji:'🎨', bc:'#6A1B9A',vc:'#CE93D8'},
  {name:'Rand',   role:'SEO',         emoji:'🔍', bc:'#006064',vc:'#80DEEA'},
  {name:'Hormozi',role:'Strategy',    emoji:'🧭', bc:'#E65100',vc:'#FFB74D'},
];
const LOG_C=['#5dade2','#e74c3c','#2ecc71','#9b59b6','#1abc9c','#f39c12'];
const SITS=[
  {sx:145,sy:130},{sx:226,sy:130},{sx:308,sy:130},
  {sx:392,sy:130},{sx:472,sy:130},{sx:556,sy:130},
];
const COFP={x:300,y:360};
const CHSP=[{x:76,y:242},{x:96,y:254},{x:68,y:262},{x:108,y:248}];
const SOSP=[{x:28,y:220},{x:44,y:220},{x:58,y:220}];

let AGENTS=[];
function initAgents(){
  AGENTS=ADEFS.map((d,i)=>{
    const s=SITS[i];
    return{...d,idx:i,x:s.sx+(Math.random()-.5)*22,y:s.sy+(Math.random()-.5)*14,
      sx:s.sx,sy:s.sy,state:i%2===0?'sitting':'walk_desk',
      stTimer:Math.floor(Math.random()*180),wFrame:0,wTimer:0,dir:'d',spd:1.1+Math.random()*.5};
  });
  AGENTS.forEach(a=>{if(a.state==='sitting'){a.x=a.sx;a.y=a.sy;}});
}

function updateAgents(){
  AGENTS.forEach(a=>{
    a.stTimer++;
    if(a.state.startsWith('walk')){
      a.wTimer++;if(a.wTimer>=8){a.wTimer=0;a.wFrame=(a.wFrame+1)%4;}
    } else{a.wFrame=0;a.wTimer=0;}
    const go=(tx,ty,next)=>{
      const dx=tx-a.x,dy=ty-a.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<2){a.x=tx;a.y=ty;a.state=next;a.stTimer=0;}
      else{a.x+=dx/d*a.spd;a.y+=dy/d*a.spd;
        a.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'r':'l'):(dy>0?'d':'u');}
    };
    switch(a.state){
      case'walk_desk':case'walk_back': go(a.sx,a.sy,'sitting'); break;
      case'walk_coffee': go(COFP.x+(Math.random()-.5)*18,COFP.y,'at_coffee'); break;
      case'walk_chat':   go(CHSP[a.idx%CHSP.length].x,CHSP[a.idx%CHSP.length].y,'chatting'); break;
      case'walk_sofa':   go(SOSP[a.idx%SOSP.length].x,SOSP[a.idx%SOSP.length].y,'on_sofa'); break;
      case'sitting': if(a.stTimer>250+Math.random()*200){
        const r=Math.random();
        a.state=r<0.45?'walk_coffee':r<0.75?'walk_chat':'walk_sofa';a.stTimer=0;} break;
      case'at_coffee': if(a.stTimer>90+Math.random()*70){a.state='walk_back';a.stTimer=0;addLog(a.name,'voltou do café ☕',a.idx);} break;
      case'chatting': if(a.stTimer>120+Math.random()*80){a.state='walk_back';a.stTimer=0;} break;
      case'on_sofa': a.dir='d';if(a.stTimer>160+Math.random()*120){a.state='walk_back';a.stTimer=0;} break;
    }
  });
}

function drawAgents(tick){
  [...AGENTS].sort((a,b)=>a.y-b.y).forEach(a=>{
    // draw the Among Us crewmate
    drawCrewmate(a.x, a.y, a.bc, a.vc, a.wFrame, a.state);

    // Name tag (above character)
    const nm=a.name;
    ctx.font='bold 8.5px "Share Tech Mono",monospace';
    ctx.textAlign='center';
    const tw=ctx.measureText(nm).width;
    ctx.fillStyle='rgba(0,3,12,0.9)';
    ctx.beginPath();rr(a.x-tw/2-4,a.y-76,tw+8,12,2);ctx.fill();
    const sc={sitting:'#00ff88',on_sofa:'#00ff88',at_coffee:'#ff6b00',chatting:'#c39bd3'};
    ctx.fillStyle=sc[a.state]||'#00f5ff';
    ctx.fillText(nm,a.x,a.y-67);

    // Role tiny
    ctx.fillStyle='rgba(138,180,212,0.45)';
    ctx.font='6px "Share Tech Mono",monospace';
    ctx.fillText(a.role,a.x,a.y-59);

    // Chat bubble
    if(a.state==='chatting'||a.state==='at_coffee'){
      const bubs=['...','💡','✓','📈','ok!','☕'];
      const b=bubs[Math.floor(tick/50)%bubs.length];
      ctx.fillStyle='rgba(0,245,255,0.11)';
      ctx.beginPath();rr(a.x+14,a.y-72,20,13,3);ctx.fill();
      ctx.strokeStyle='rgba(0,245,255,0.48)';ctx.lineWidth=0.7;
      ctx.beginPath();rr(a.x+14,a.y-72,20,13,3);ctx.stroke();
      ctx.fillStyle='#00f5ff';ctx.font='9px monospace';ctx.textAlign='left';
      ctx.fillText(b,a.x+17,a.y-62);
    }
  });
}

// ══════════════════════════════════════════════════════
//  HUD & LOG
// ══════════════════════════════════════════════════════
const SLBL={sitting:'TRABALHANDO',on_sofa:'NO SOFÁ',walk_desk:'ANDANDO',walk_back:'ANDANDO',walk_coffee:'→ CAFÉ',at_coffee:'NO CAFÉ',walk_chat:'→ CHAT',chatting:'CONVERSANDO',walk_sofa:'→ SOFÁ'};
const SCSS={sitting:'sw2',on_sofa:'sw2',walk_desk:'sw3',walk_back:'sw3',walk_coffee:'sw3',at_coffee:'sw4',walk_chat:'sw3',chatting:'sw5',walk_sofa:'sw3'};
function updateHUD(){
  document.getElementById('al').innerHTML=AGENTS.map(a=>`
    <div class="ar">
      <div class="ae">${a.emoji}</div>
      <div class="ai"><div class="an">${a.name}</div><div class="arl">${a.role}</div></div>
      <div class="as ${SCSS[a.state]||'sw3'}">${SLBL[a.state]||'ANDANDO'}</div>
    </div>`).join('');
}
const LMSGS=['headline v3 ✓','CPL -R$0.80 ↓','conv 4.1% ↑','brief recebido','43 keywords ✓','ROAS 4.2x ↑','AB test B +12%','funil otimizado','email Maio ✓','budget +20%','backlog ok ✓','SEO done'];
let lmi=0;
function addLog(name,msg,idx){
  const now=new Date().toLocaleTimeString('pt-BR',{hour12:false});
  const f=document.getElementById('lf');
  const d=document.createElement('div');d.className='ll';
  d.innerHTML=`<span class="lt">${now}</span><span style="min-width:50px;color:${LOG_C[idx%6]};font-weight:bold">${name}</span><span class="lm">${msg}</span>`;
  f.appendChild(d);while(f.children.length>9)f.removeChild(f.firstChild);
}
setInterval(()=>{const a=AGENTS[Math.floor(Math.random()*AGENTS.length)];if(a)addLog(a.name,LMSGS[lmi++%LMSGS.length],a.idx);},2500);
setInterval(()=>document.getElementById('clk').textContent=new Date().toLocaleTimeString('pt-BR',{hour12:false}),1000);
let tok=284901;
setInterval(()=>{tok+=Math.floor(Math.random()*110+30);document.getElementById('tok').textContent=tok.toLocaleString('pt-BR');},1100);

// ══════════════════════════════════════════════════════
//  PIXI.JS — BLOOM GLOW OVERLAY (screen blend mode)
// ══════════════════════════════════════════════════════
// Canvas stays visible (opacity 1). PixiJS overlay = transparent bg +
// mix-blend-mode:screen. Only the blurred glow layer is rendered —
// dark pixels ≈ transparent in screen mode, bright neons = halo glow.
// NEVER set _overlayEl.width/height directly (kills WebGL context).
const _overlayEl = document.createElement('canvas');
_overlayEl.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;mix-blend-mode:screen;';
SW.appendChild(_overlayEl);

const _pixiApp = new PIXI.Application({
  view: _overlayEl,
  width: canvas.width, height: canvas.height,
  backgroundAlpha: 0,  // transparent — only glow is drawn
  antialias: true,
  resolution: 1,
});

// Canvas 2D stays fully visible beneath the glow overlay
canvas.style.opacity = '1';

// BaseTexture.from(canvas) — confirmed working in PixiJS 7
const _sceneBt     = PIXI.BaseTexture.from(canvas);
const _sceneTx     = new PIXI.Texture(_sceneBt);
const _glowSprite  = new PIXI.Sprite(_sceneTx);

// Heavy blur = wide glow halo; ColorMatrix boosts saturation of the glow
const _blurFilter = new PIXI.BlurFilter(16, 4, 1, 9);
const _cmFilter   = new PIXI.ColorMatrixFilter();
_cmFilter.saturate(0.6, false);
_glowSprite.filters = [_blurFilter, _cmFilter];
_pixiApp.stage.addChild(_glowSprite);

// PixiJS ticker: sync sprite size + re-upload canvas pixels every frame
_pixiApp.ticker.add(()=>{
  _glowSprite.width  = canvas.width;
  _glowSprite.height = canvas.height;
  _sceneBt.update();
});

function _pixiResize(){
  // Only renderer.resize — NEVER touch _overlayEl.width/height (kills WebGL ctx)
  _pixiApp.renderer.resize(canvas.width, canvas.height);
  _glowSprite.width  = canvas.width;
  _glowSprite.height = canvas.height;
}
_pixiResize();
_pixiReady = true;

// ══════════════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════════════
let tick=0,hudT=0;
function loop(){
  // ── Canvas 2D frame ──
  ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.restore();
  setTx();
  drawRoom(tick);
  updateAgents();
  drawAgents(tick);
  if(++hudT%30===0)updateHUD();
  tick++;
  // PixiJS bloom é gerenciado pelo seu próprio ticker — sem chamada aqui
  requestAnimationFrame(loop);
}
initAgents();loop();updateHUD();
addLog('Sistema','Futuristas HQ — squad Among Us online',0);
</script>
